server:
  port: 8084

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL}
              predicates:
                - Path=/auth/**,/tokens/**
            - id: user-service
              uri: ${USER_SERVICE_URL}
              predicates:
                - Path=/users/**,/cards/**
            - id: order-service
              uri: ${ORDER_SERVICE_URL}
              predicates:
                - Path=/orders/**,/items/**

authClient.url: ${AUTH_SERVICE_URL}