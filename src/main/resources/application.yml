spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**,/tokens/**
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/users/**,/cards/**
            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/orders/**,/items/**

logging:
  file.name: logs/log.log
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.http.server.reactive: DEBUG

authClient.url: http://localhost:8081